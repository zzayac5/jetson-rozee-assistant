<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  padding: 10px;
  overflow: hidden;
}

h2 {
  margin: 0 0 8px 0;
  font-size: 24px;
}

#history {
  white-space: pre-wrap;
  font-size: 18px;
  height: 52vh;
  overflow-y: auto;
  margin-bottom: 10px;
  border: 1px solid #333;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}

button {
  font-size: 18px;
  padding: 10px 14px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#status {
  font-size: 16px;
  margin-top: 4px;
}
</style>
</head>
<body>

<h2>Rozee</h2>

<div id="history">Ready!</div>

<div class="controls">
  <button id="talkBtn" onclick="toggleTalk()">Start Talking</button>
  <button id="resetBtn" onclick="resetApp()">Reset</button>
</div>

<div id="status">Idle</div>

<script>
let conversation = [];
let currentAssistantText = "";
let isRecording = false;
let isBusy = false;

function renderHistory() {
  const history = document.getElementById("history");
  let text = "";

  for (const msg of conversation) {
    if (msg.role === "user") {
      text += "You: " + msg.content + "\n\n";
    } else if (msg.role === "assistant") {
      text += "Rozee: " + msg.content + "\n\n";
    }
  }

  history.innerText = text.trim() || "Ready!";
  history.scrollTop = history.scrollHeight;
}

function unlockUI() {
  const talkBtn = document.getElementById("talkBtn");
  isBusy = false;
  isRecording = false;
  talkBtn.disabled = false;
  talkBtn.innerText = "Start Talking";
}

async function resetApp() {
  const status = document.getElementById("status");
  const talkBtn = document.getElementById("talkBtn");

  talkBtn.disabled = true;
  status.innerText = "Resetting...";

  try {
    await fetch("/reset", { method: "POST" });
  } catch (err) {
  }

  unlockUI();
  status.innerText = "Idle";
}

async function toggleTalk() {
  const talkBtn = document.getElementById("talkBtn");
  const status = document.getElementById("status");

  if (isBusy && !isRecording) return;

  if (!isRecording) {
    try {
      const res = await fetch("/start_recording", { method: "POST" });
      const data = await res.json();

      if (!res.ok || data.error) {
        status.innerText = "Error: " + (data.error || "Failed to start recording");
        unlockUI();
        return;
      }

      isRecording = true;
      isBusy = true;
      talkBtn.innerText = "Stop Talking";
      status.innerText = "Listening...";
    } catch (err) {
      status.innerText = "Error: " + err.message;
      unlockUI();
    }
  } else {
    try {
      talkBtn.disabled = true;
      status.innerText = "Stopping...";

      const stopRes = await fetch("/stop_recording", { method: "POST" });
      const stopData = await stopRes.json();

      if (!stopRes.ok || stopData.error) {
        status.innerText = "Error: " + (stopData.error || "Failed to stop recording");
        unlockUI();
        return;
      }

      isRecording = false;
      talkBtn.innerText = "Start Talking";
      status.innerText = "Transcribing...";

      conversation.push({ role: "user", content: "" });
      conversation.push({ role: "assistant", content: "" });
      currentAssistantText = "";
      renderHistory();

      const response = await fetch("/voice_turn", { method: "POST" });

      if (!response.ok) {
        let errorText = "Voice turn failed";
        try {
          const errData = await response.json();
          errorText = errData.error || errorText;
        } catch (e) {}
        conversation.pop();
        conversation.pop();
        renderHistory();
        status.innerText = "Error: " + errorText;
        unlockUI();
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const result = await reader.read();
        if (result.done) break;

        buffer += decoder.decode(result.value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith("data: ")) continue;

          const payload = JSON.parse(part.slice(6));

          if (payload.transcript) {
            conversation[conversation.length - 2].content = payload.transcript;
            status.innerText = "Thinking...";
            renderHistory();
          }

          if (payload.token) {
            currentAssistantText += payload.token;
            conversation[conversation.length - 1].content = currentAssistantText;
            status.innerText = "Speaking...";
            renderHistory();
          }

          if (payload.error) {
            status.innerText = "Error: " + payload.error;
            unlockUI();
            return;
          }

          if (payload.done) {
            status.innerText = "Idle";
            unlockUI();
            return;
          }
        }
      }

      status.innerText = "Idle";
      unlockUI();

    } catch (err) {
      status.innerText = "Error: " + err.message;
      unlockUI();
    }
  }
}
</script>

</body>
</html>
